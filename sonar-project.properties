sonar.projectKey=BozhanL_rehua
sonar.organization=bozhanl

# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=rehua
#sonar.projectVersion=1.0


# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
#sonar.sources=.

# Encoding of the source code. Default is default system encoding
#sonar.sourceEncoding=UTF-8

sonar.javascript.lcov.reportPaths=./api/coverage/lcov.info, ./web/coverage/lcov.info

sonar.sources = ./api/src, ./web/app
sonar.tests = ./api/src, ./web/app

sonar.exclusions = **/*.spec.ts, **/*.test.tsx
sonar.test.inclusions = **/*.spec.ts, **/*.test.tsx

sonar.typescript.tsconfigPaths=web/tsconfig.json, api/tsconfig.json
