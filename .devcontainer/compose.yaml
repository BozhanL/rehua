services:
  app:
    image: mcr.microsoft.com/devcontainers/typescript-node:24-trixie@sha256:627da5f4ab0dfa32c23cd93a10925c20bf92e5f2814cec74cde8520fb33e3ec4
    volumes:
      - ../..:/workspaces:cached
    network_mode: service:db
    command: sleep infinity

  db:
    image: mongo:8.3@sha256:a7f5aa200005611166adcec0192c2f11d0acc3bfd9d5eb68e1a998a990412e41
    restart: unless-stopped
    environment:
      # Work around MongoDB 8.0+ startup crashes on Linux kernel 6.19
      # https://jira.mongodb.org/browse/SERVER-121912?focusedId=839528
      GLIBC_TUNABLES: glibc.pthread.rseq=1
    volumes:
      - mongodb-data:/data/db
      - mongo_config:/data/configdb

volumes:
  mongodb-data:
  mongo_config:
