services:
  app:
    image: mcr.microsoft.com/devcontainers/typescript-node:24-trixie@sha256:627da5f4ab0dfa32c23cd93a10925c20bf92e5f2814cec74cde8520fb33e3ec4
    volumes:
      - ../..:/workspaces:cached
    network_mode: service:db
    command: sleep infinity

  db:
    image: mongo:8.3@sha256:a7f5aa200005611166adcec0192c2f11d0acc3bfd9d5eb68e1a998a990412e41
    restart: unless-stopped
    volumes:
      - mongodb-data:/data/db
      - mongo_config:/data/configdb

volumes:
  mongodb-data:
  mongo_config:
