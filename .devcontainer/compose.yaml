services:
  app:
    image: mcr.microsoft.com/devcontainers/typescript-node:24-trixie@sha256:627da5f4ab0dfa32c23cd93a10925c20bf92e5f2814cec74cde8520fb33e3ec4
    volumes:
      - ../..:/workspaces:cached
    network_mode: service:db
    command: sleep infinity

  db:
    image: mongo:8.3@sha256:48a009d2d8007e92d6d7e8baa31713cd11c48c06e827e856240e5a1d319b49d9
    restart: unless-stopped
    volumes:
      - mongodb-data:/data/db
      - mongo_config:/data/configdb

volumes:
  mongodb-data:
  mongo_config:
