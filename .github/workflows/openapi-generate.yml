# Based on https://github.com/jellyfin/jellyfin/blob/a43fd188dc0d2a3cfdd4ae3b71b537780dcb3fc9/.github/workflows/openapi-generate.yml
# This copy may contain project-specific modifications.
name: OpenAPI Generate

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
      repository:
        required: true
        type: string
      artifact:
        required: true
        type: string

permissions: {}

jobs:
  main:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.ref }}
          repository: ${{ inputs.repository }}

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: package.json
          cache: npm
          check-latest: true

      - name: 📦 Install dependencies
        run: npm ci --no-audit

      - name: 🏗️ Build openapi
        run: npm run build:api -w api

      - name: 📦 Upload Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.artifact }}
          if-no-files-found: error
          path: api/swagger.json
          retention-days: 7
