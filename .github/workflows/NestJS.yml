name: NestJS CI/CD

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    strategy:
      matrix:
        command: [type, lint, format]

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: package.json
          cache: npm
          check-latest: true

      - name: 📦 Install dependencies
        run: npm ci --no-audit

      - name: 🧪 Run ${{ matrix.command }} -w api
        run: npm run ${{ matrix.command }} -w api

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write # To create commit comment
      pull-requests: write
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: package.json
          cache: npm
          check-latest: true

      - name: 📦 Install dependencies
        id: install
        run: npm ci --no-audit

      - name: 🧪 Run tests
        run: npm run test:cov -w api | tee ./api/coverage.txt && exit ${PIPESTATUS[0]}

      - name: 🧪 Run tests (E2E)
        run: npm run test:e2e -w api

      - name: 🧪 Run Jest Coverage Comment
        uses: MishaKav/jest-coverage-comment@25f2818fee93043532f640ad32a7565b4bd4ea9a # v1.0.34
        if: ${{ success() || (failure() && steps.install.conclusion == 'success') }}
        with:
          create-new-comment: false
          coverage-path: ./api/coverage.txt
          multiple-junitxml-files: |
            Unit test, ./api/coverage/junit.xml
            E2E, ./api/test/coverage/junit.xml
          coverage-summary-path: ./api/coverage/coverage-summary.json
          coverage-path-prefix: api/
          unique-id-for-comment: NestJS
          title: Coverage Report (NestJS)

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: package.json
          cache: npm
          check-latest: true

      - name: 📦 Install dependencies
        run: npm ci --no-audit

      - name: 🏗️ Build
        run: npm run build -w api

      - name: 📦 Upload build artifacts to GitHub
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        id: upload
        with:
          name: dist
          if-no-files-found: error
          path: ./api/dist
          retention-days: 7

  collect:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    name: Final Results (NestJS)
    timeout-minutes: 2
    needs:
      - check
      - test
      - build
    steps:
      - name: ✔️ Fail if any dependency failed
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1
